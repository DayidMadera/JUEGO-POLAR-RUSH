<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <link href="img/teclado-espac3b1ol-numeros.jpg" rel="icon">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Polar Space</title>

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>

    <script src="https://rawgit.com/mayognaise/aframe-gif-shader/master/dist/aframe-gif-shader.min.js"></script>

    <style>

        body { margin: 0; font-family: 'Courier New', monospace; background: #000; overflow: hidden; touch-action: none; }

        .overlay {

            position: absolute; top: 0; left: 0; width: 100%; height: 100%;

            background: radial-gradient(circle, #0e0a2e 0%, #000 100%);

            z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center;

            color: #008cff; text-align: center; border: 8px double #4e24e6; box-sizing: border-box;

        }

        .terminal-box {

            background: rgba(0, 0, 0, 0.95); padding: 50px;

            border: 2px solid #603dc2; box-shadow: 0 0 40px #0c11ff; border-radius: 20px;

        }

        input {

            background: #000; border: 1px solid #6e32bd; color: #3f0bcf;

            padding: 15px; font-size: 22px; font-family: inherit; text-align: center;

            width: 320px; margin-top: 25px; outline: none; text-transform: uppercase;

        }

        .btn-systec {

            margin-top: 35px; padding: 15px 45px; background: #3700ff; color: #000;

            border: none; font-weight: bold; cursor: pointer; font-size: 20px;

            clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);

            transition: 0.3s;

        }

        #ui-top { 

            position: absolute; top: 20px; left: 20px; z-index: 10; 

            background: rgba(0,10,20,0.85); color: #ffffff; padding: 18px; 

            border: 2px solid #8400ff; border-radius: 10px; display: none;

        }

        /* CONTROLES MÓVILES */

        .controles-movil {

            position: absolute; bottom: 20px; width: 100%;

            display: none; justify-content: space-between; padding: 0 30px;

            box-sizing: border-box; z-index: 1000; pointer-events: none;

        }

        .d-pad { display: grid; grid-template-columns: repeat(3, 55px); gap: 5px; pointer-events: auto; }

        .d-btn, .btn-salto {

            width: 55px; height: 55px; background: rgba(153, 0, 255, 0.2);

            border: 2px solid #ae00ff; color: #5900ff; display: flex;

            align-items: center; justify-content: center; border-radius: 10px;

            font-weight: bold; user-select: none; -webkit-user-select: none;

        }

        .btn-salto { width: 100px; height: 80px; font-size: 14px; pointer-events: auto; }

    </style>

   <script>

    let nombrePiloto = "";

    let juegoIniciado = false;

    function iniciarMision() {

        const input = document.querySelector('#input-nombre');

        if (input.value.trim() === "") { 

            alert("IDENTIFICACIÓN REQUERIDA"); 

            return; 

        }

        // 1. Guardar datos del piloto

        nombrePiloto = input.value.toUpperCase();

        localStorage.setItem('nombrePiloto', nombrePiloto);

        document.querySelector('#user-display').innerText = nombrePiloto;

        // 2. Cambiar pantallas UI

        document.querySelector('#pantalla-registro').style.display = "none";

        document.querySelector('#ui-top').style.display = "block";

        // 3. --- ACTIVAR SONIDO (SOLUCIÓN) ---

        var sonido = document.querySelector('#audio-fondo');

        if (sonido && sonido.components.sound) {

            sonido.components.sound.playSound();

        }

        // 4. Mostrar controles si es celular

        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {

            document.querySelector('.controles-movil').style.display = "flex";

        }

        // 5. Iniciar físicas del juego

        setTimeout(() => { 

            juegoIniciado = true; 

        }, 200);

    }

    AFRAME.registerComponent('motor-gameplay', {

        init: function () {

            const puntajeGuardado = localStorage.getItem('puntajeAcumulado');

            this.puntos = puntajeGuardado ? parseInt(puntajeGuardado) : 0;

            this.puedeSaltar = true;

            this.vidas = 3; 

            this.alturaMax = 0; 

            this.invulnerable = false; 

            this.keys = {};

            

            this.actualizarUI();

            window.addEventListener('keydown', (e) => { this.keys[e.code] = true; });

            window.addEventListener('keyup', (e) => { this.keys[e.code] = false; });

            const bindTouch = (id, code) => {

                const el = document.querySelector(id);

                if(!el) return;

                el.addEventListener('touchstart', (e) => { 

                    e.preventDefault(); 

                    this.keys[code] = true; 

                }, {passive: false});

                el.addEventListener('touchend', (e) => { 

                    e.preventDefault(); 

                    this.keys[code] = false; 

                }, {passive: false});

            };

            bindTouch('#m-up', 'KeyW'); 

            bindTouch('#m-down', 'KeyS');

            bindTouch('#m-left', 'KeyA'); 

            bindTouch('#m-right', 'KeyD');

            bindTouch('#m-jump', 'Space');

            this.el.addEventListener('collide', (e) => {

                const target = e.detail.body.el;

                if (!target || !juegoIniciado) return;

                if (target.classList.contains('suelo')) {

                    let yActual = Math.round(target.object3D.position.y);

                    if (yActual > this.alturaMax) {

                        this.puntos += 300; 

                        this.alturaMax = yActual; 

                        this.actualizarUI();

                    }

                }

                if (target.id === 'lava' && !this.invulnerable) { 

                    this.perderVida(); 

                }

                

                if (target.id === 'meta') { 

                    this.puntos += 5000;

                    // VIBRACIÓN ÉXITO: Dos pulsos rápidos y uno largo

    if (navigator.vibrate) navigator.vibrate([50, 50, 50, 50, 500]);

    

    localStorage.setItem('puntajeAcumulado', this.puntos);

    this.finalizarJuego("¡NIVEL COMPLETADO!");

                    localStorage.setItem('puntajeAcumulado', this.puntos);

                    this.finalizarJuego("¡NIVEL COMPLETADO!"); 

                    setTimeout(() => {

                        window.location.href = "juego1.html"; 

                    }, 2000);

                }

            });

        },

        perderVida: function() {

    this.invulnerable = true;

    this.vidas--; 

    this.actualizarUI();

    if (this.vidas <= 0) {

        // 1. Vibración de GAME OVER (3 pulsos)

        if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 300]);

        

        localStorage.removeItem('puntajeAcumulado');

        this.finalizarJuego("GAME OVER");

    } else { 

        // 2. Vibración de impacto simple (Si aún le quedan vidas)

        if (navigator.vibrate) navigator.vibrate(200);

        // 3. Reposicionar al jugador al inicio

        this.el.body.position.set(0, 3, 0); 

        this.el.body.velocity.set(0, 0, 0); 

        this.el.body.quaternion.set(0, 0, 0, 1);

        

        // Volver a ser vulnerable tras 1 segundo

        setTimeout(() => { this.invulnerable = false; }, 1000);

    }

        },

        actualizarUI: function() {

            const puntosVal = document.querySelector('#puntos-val');

            const vidasVal = document.querySelector('#vidas-val');

            if(puntosVal) puntosVal.innerText = this.puntos;

            if(vidasVal) vidasVal.innerText = "❤️".repeat(this.vidas > 0 ? this.vidas : 0);

        },

        finalizarJuego: function(titulo) {

            juegoIniciado = false;

            document.querySelector('#game-over-screen').style.display = "flex";

            if(document.querySelector('.controles-movil')) {

                document.querySelector('.controles-movil').style.display = "none";

            }

            document.querySelector('#final-title').innerText = titulo;

            document.querySelector('#final-score').innerText = `${nombrePiloto}, PUNTUACIÓN: ${this.puntos}`;

        },

        tick: function () {

            if (!this.el.body || !juegoIniciado) return;

            this.el.body.quaternion.set(0, 0, 0, 1);

            this.el.body.angularVelocity.set(0, 0, 0);

            let v = this.el.body.velocity;

            let f = 8;

            if (this.keys['KeyW']) v.z = -f; else if (this.keys['KeyS']) v.z = f; else v.z = 0;

            if (this.keys['KeyA']) v.x = -f; else if (this.keys['KeyD']) v.x = f; else v.x = 0;

            

            if (this.keys['Space']) {

                if (Math.abs(v.y) < 0.1 && this.puedeSaltar) { 

                    v.y = 13; 

                    this.puedeSaltar = false; 

                }

            } else {

                this.puedeSaltar = true; 

            }

        }

    });

    AFRAME.registerComponent('seguimiento-camara', {

        init: function () {

            this.objetivo = document.querySelector('#jugador');

            this.keys = {};

            window.addEventListener('keydown', (e) => { this.keys[e.code] = true; });

            window.addEventListener('keyup', (e) => { this.keys[e.code] = false; });

            this.currentRotation = { x: -20, y: 0, z: 0 }; 

        },

        tick: function () {

            if (!this.objetivo || !juegoIniciado) return;

            this.el.object3D.position.lerp(this.objetivo.object3D.position, 0.1);

            if (this.keys['ArrowLeft']) this.currentRotation.y += 2.0;

            if (this.keys['ArrowRight']) this.currentRotation.y -= 2.0;

            if (this.keys['ArrowUp']) this.currentRotation.x -= 1.0;

            if (this.keys['ArrowDown']) this.currentRotation.x += 1.0;

            this.currentRotation.x = Math.max(-60, Math.min(20, this.currentRotation.x));

            this.el.setAttribute('rotation', 

                `${this.currentRotation.x} ${this.currentRotation.y} ${this.currentRotation.z}`);

        }

    });

    function irAlIndex() {

        localStorage.removeItem('puntajeAcumulado');

        window.location.href = "index.html"; 

    }

</script>

</head>

<body>

    <div class="controles-movil">

        <div class="d-pad">

            <div></div><div id="m-up" class="d-btn">▲</div><div></div>

            <div id="m-left" class="d-btn">◀</div><div id="m-down" class="d-btn">▼</div><div id="m-right" class="d-btn">▶</div>

        </div>

        <div id="m-jump" class="btn-salto">SALTO</div>

    </div>

    <div id="pantalla-registro" class="overlay">

        <div class="terminal-box">

            <h1 style="letter-spacing: 12px; margin: 0;">POLAR SPACE</h1>

            <input type="text" id="input-nombre" placeholder="NOMBRE" maxlength="12" autocomplete="off">

            <br>

            <button class="btn-systec" onclick="iniciarMision()">INICIAR</button>

            <br>

            <button onclick="irAlIndex()" style="margin-top: 20px; background: rgba(0,255,204,0.1); border: 1px solid #002fff; color: #ffffff; cursor: pointer; font-family: inherit; font-size: 14px; padding: 12px; width: 100%; position: relative; z-index: 5000;">

                ⬅ VOLVER

            </button>

        </div>

    </div>

    <div id="ui-top">

        ID: <span id="user-display">---</span><br>

        PTS: <span id="puntos-val">0</span><br>

        <div id="vidas-val">❤️❤️❤️</div>

    </div>

    <div id="game-over-screen" class="overlay" style="display: none;">

    <div class="terminal-box">

        <h1 id="final-title">TERMINADO</h1>

        <p id="final-score"></p>

        <button class="btn-systec" onclick="location.reload()">REINTENTAR MISIÓN</button>

    </div>

</div>

    <a-scene physics="gravity: -18; friction: 0.01;">

     <a-assets>

    <img id="textura-cielo" src="fondo.png">

    <img id="textura-lava" src="fondo.png">

    

</a-assets>

<a-plane id="lava" static-body position="0 -6 0" rotation="-90 0 0" width="2000" height="2000" 

         material="src: #textura-lava; repeat: 20 20; transparent: true;  emissiveIntensity: 0.5"

         

         animation="property: material.offset; from: 0 0; to: 1 1; dur: 30000; loop: true; easing: linear">

</a-plane>

<a-entity obj-model="obj: #modelo-mar; mtl: #material-mar" 

          position="0 5 -10" 

          scale="0.5 0.5 0.5"

          rotation="-90 0 0"

          

          static-body="shape: box; width: 2; height: 5; depth: 1"

          animation="property: rotation; to: -90 360 0; dur: 10000; loop: true; easing: linear"> 

</a-entity>

        <a-sphere id="sky-dome" radius="150" material="src: #textura-cielo; shader: flat; side: back" rotation="0 -90 0"></a-sphere>

        <a-stars radius="120" count="8000" color="#00ffcc"></a-stars>

<a-sound id="audio-fondo" src="#musica-fondo" loop="true" volume="0.020"></a-sound>

<a-box class="suelo" static-body position="0 0 0" width="8" height="0.3" depth="8" color="#A020F0"></a-box>

        <a-box class="suelo" static-body position="0 3 -10" width="5" height="0.4" depth="5" color="#A020F0"></a-box>
        
        <a-box class="suelo" static-body position="-8 6 -15" width="5" height="0.4" depth="5" color="#A020F0"></a-box>
        
        <a-box class="suelo" static-body position="5 9 -20" width="5" height="0.4" depth="5" color="#A020F0"></a-box>

        <a-text value="MANTEN EL EQUILIBRIO" position="0 14 -30" align="center" color="#00ffcc" scale="3 3 3"></a-text>
        <a-box class="suelo" static-body position="0 12 -30" width="6" height="0.3" depth="12" color="#A020F0"></a-box>

        <a-box class="suelo" static-body position="0 15 -45" width="4" height="0.4" depth="4" color="#A020F0"></a-box>
        
        <a-box class="suelo" static-body position="10 18 -55" width="4" height="0.4" depth="4" color="#A020F0"></a-box>
        
        <a-box class="suelo" static-body position="-10 21 -65" width="4" height="0.4" depth="4" color="#A020F0"></a-box>

        <a-box class="suelo" static-body position="-10 21 -65" width="4" height="0.4" depth="4" color="#A020F0"></a-box>

        
        <a-box class="suelo" static-body position="-10 21 -65" width="4" height="0.4" depth="4" color="#A020F0"></a-box>

        <a-box class="suelo" static-body position="5 21 -65" width="4" height="0.4" depth="4" color="#A020F0"></a-box>

        <a-box class="suelo" static-body position="0 23 -75" width="10" height="0.3" depth="10" color="#A020F0"></a-box>

        <a-entity id="meta" static-body position="0 26 -95">
            <a-box width="18" height="0.5" depth="18" color="#A020F0" material="emissive: ##A020F0; emissiveIntensity: 2"></a-box>

            <a-light type="point" intensity="1" color="#A020F0" position="0 6 0"></a-light>
        </a-entity>

        

        <a-entity id="meta" static-body position="0 26 -90">

            <a-box width="18" height="0.5" depth="18" color="#A020F0" material="emissive: #A020F0; emissiveIntensity: 2"></a-box>

            <a-text value="CORE ALCANZADO" align="center" position="0 5 0" scale="12 12 12"></a-text>

            

        </a-entity>

       
            <a-entity id="jugador" 
          position="0 3 0" 
          scale="1.5 1.5 1.5" 
          rotation="0 0 0"
          motor-gameplay 
          dynamic-body="mass: 2; fixedRotation: true">

    <!-- CUERPO -->
    <a-sphere radius="0.6" color="#f5f5f5" position="0 0.7 0"></a-sphere>

    <!-- CUELLO -->
    <a-cylinder radius="0.25" height="0.3" color="#f5f5f5" position="0 1.05 -0.2"></a-cylinder>

    <!-- CABEZA -->
    <a-sphere radius="0.4" color="#ffffff" position="0 1.3 -0.5"></a-sphere>

    <!-- HOCICO -->
    <a-sphere radius="0.18" color="#eaeaea" position="0 1.2 -0.8"></a-sphere>

    <!-- NARIZ -->
    <a-sphere radius="0.07" color="#000" position="0 1.2 -0.95"></a-sphere>

    <!-- OJOS -->
    <a-sphere radius="0.06" color="#000" position="-0.15 1.35 -0.8"></a-sphere>
    <a-sphere radius="0.06" color="#000" position="0.15 1.35 -0.8"></a-sphere>

    <!-- OREJAS -->
    <a-sphere radius="0.14" color="#ffffff" position="-0.22 1.6 -0.45"></a-sphere>
    <a-sphere radius="0.14" color="#ffffff" position="0.22 1.6 -0.45"></a-sphere>

<!-- CÚPULA DEL CASCO (VIDRIO) -->
<a-sphere 
    radius="0.65" 
    position="0 1.3 -0.5"
    material="color: #aeefff; transparent: true; opacity: 0.2; metalness: 0.6; roughness: 0.05; envMapIntensity: 1">
</a-sphere>

<!-- REFLEJO DEL VISOR -->
<a-sphere 
    radius="0.63" 
    position="0 1.32 -0.48"
    material="color: #ffffff; transparent: true; opacity: 0.05">
</a-sphere>

<!-- ARO PRINCIPAL DEL CASCO -->
<a-torus 
    radius="0.48" 
    radius-tubular="0.06" 
    position="0 1.0 -0.5"
    rotation="90 0 0"
    material="color: #bbbbbb; metalness: 0.9; roughness: 0.2">
</a-torus>

<!-- BASE DEL CUELLO -->
<a-cylinder 
    radius="0.42" 
    height="0.2"
    position="0 0.9 -0.5"
    material="color: #888888; metalness: 0.7; roughness: 0.3">
</a-cylinder>

<!-- DETALLES LATERALES -->
<a-box 
    width="0.15" height="0.15" depth="0.1"
    position="-0.5 1.2 -0.5"
    material="color: #999999; metalness: 0.8">
</a-box>

<a-box 
    width="0.15" height="0.15" depth="0.1"
    position="0.5 1.2 -0.5"
    material="color: #999999; metalness: 0.8">
</a-box>

<!-- LUZ INDICADORA -->
<a-sphere 
    radius="0.05"
    position="0.2 1.1 -0.2"
    material="color: #00ffcc; emissive: #00ffcc; emissiveIntensity: 0.8">
</a-sphere>



<!-- SOPORTE TRASERO -->
<a-cylinder 
    radius="0.1"
    height="0.3"
    position="0 1.1 -0.9"
    rotation="90 0 0"
    material="color: #777777">
</a-cylinder>
    <!-- PATAS DELANTERAS -->
    <a-cylinder radius="0.15" height="0.6" color="#ffffff" position="-0.3 0.2 -0.3"></a-cylinder>
    <a-cylinder radius="0.15" height="0.6" color="#ffffff" position="0.3 0.2 -0.3"></a-cylinder>

    <!-- PATAS TRASERAS -->
    <a-cylinder radius="0.18" height="0.5" color="#ffffff" position="-0.3 0.2 0.3"></a-cylinder>
    <a-cylinder radius="0.18" height="0.5" color="#ffffff" position="0.3 0.2 0.3"></a-cylinder>

    <!-- COLA (ahora sí visible) -->
    <a-sphere radius="0.12" color="#ffffff" position="0 0.6 0.6"></a-sphere>

</a-entity>
        

        <a-entity id="rig-camara" seguimiento-camara>

            <a-camera position="0 7 14" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>

        </a-entity>

        <a-light type="ambient" intensity="0.4"></a-light>

    </a-scene>

</body>

</html>
